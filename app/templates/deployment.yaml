apiVersion: apps/v1
kind: Deployment
metadata:
  name: parasol-insurance
  namespace: {{ .Values.namespace }}
  labels:
    app: parasol-insurance
    app.kubernetes.io/name: parasol-insurance-{{ .Values.tenant.username }}
    app.kubernetes.io/part-of: parasol-insurance-{{ .Values.environment }}
  annotations:
    app.openshift.io/vcs-uri: "https://gitlab-gitlab.{{ .Values.cluster.subdomain }}/{{ .Values.registry.organization }}/parasol-insurance"
spec:
  {{- if not .Values.hpa }}
  replicas: {{ .Values.replicas }}
  {{- end }}
  selector:
    matchLabels:
      app: parasol-insurance
  template:
    metadata:
      labels:
        app: parasol-insurance
        app.kubernetes.io/name: parasol-insurance-{{ .Values.tenant.username }}
        app.kubernetes.io/part-of: parasol-insurance-{{ .Values.environment }}
    spec:
      containers:
        - name: parasol-insurance
          image: "{{ .Values.registry.host }}/{{ .Values.registry.organization }}/parasol-insurance:{{ .Values.image.tag }}"
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              protocol: TCP
          env:
            - name: QUARKUS_LANGCHAIN4J_OPENAI_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: litellm-credentials
                  key: base_url
            - name: QUARKUS_LANGCHAIN4J_OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: litellm-credentials
                  key: api_key
            - name: POSTGRESQL_USER
              valueFrom:
                secretKeyRef:
                  name: parasol-db
                  key: database-user
            - name: POSTGRESQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: parasol-db
                  key: database-password
            - name: POSTGRESQL_DATABASE
              valueFrom:
                secretKeyRef:
                  name: parasol-db
                  key: database-name
            - name: POSTGRESQL_HOST
              value: parasol-db
            - name: DEV_KAFKA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: kafka-credentials
                  key: password
            - name: KAFKA_TOPIC
              value: {{ .Values.kafka.topic }}
          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu }}
              memory: {{ .Values.resources.requests.memory }}
            limits:
              cpu: {{ .Values.resources.limits.cpu }}
              memory: {{ .Values.resources.limits.memory }}
          readinessProbe:
            httpGet:
              path: /q/health/ready
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /q/health/live
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
